services:
  - type: web
    name: ai-scene-studio
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TEXT_MODEL
        value: gemini-2.0-flash
      - key: IMAGE_MODEL
        value: gemini-2.0-flash-image-generation
      - key: DEFAULT_KEY_COLOR
        value: "#00FF00"
